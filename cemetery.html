<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Кладбище — Tales from the Дед</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Caveat&family=Crimson+Text&display=swap" rel="stylesheet">
  <style>
    :root {
      --olive: #3d4a2e;
      --sepia: #5c4a3a;
      --blood: #7a2828;
      --jaundice: #c2a55a;
      --graphite: #1a1a1a;
      --cream: #d4c4a8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Crimson Text", serif;
      background: var(--graphite);
      color: var(--cream);
      min-height: 100vh;
      overflow-x: hidden;
    }
    header {
      text-align: center;
      padding: 32px 16px;
      border-bottom: 1px solid var(--sepia);
      position: relative;
    }
    header h1 {
      font-family: "Special Elite", monospace;
      font-size: clamp(1.8rem, 5vw, 3rem);
      color: var(--blood);
      letter-spacing: 4px;
      text-transform: uppercase;
    }
    header .subtitle {
      font-family: "Caveat", cursive;
      font-size: 1.2rem;
      color: var(--jaundice);
      margin-top: 8px;
    }
    .back-btn {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--sepia);
      text-decoration: none;
      font-family: "Special Elite", monospace;
      font-size: 0.9rem;
      border: 1px solid var(--sepia);
      padding: 8px 16px;
      transition: 0.2s;
    }
    .back-btn:hover, .back-btn:active {
      background: var(--blood);
      color: var(--cream);
      border-color: var(--blood);
    }
    .cemetery-container {
      position: relative;
      min-height: 80vh;
      padding: 40px 20px;
      overflow: hidden;
    }
    .ground {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 40%;
      background: linear-gradient(to bottom, transparent, var(--olive));
      z-index: 1;
    }
    .ground.bloody {
      background: linear-gradient(to bottom, transparent, #3d2020);
    }
    .mist {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 60%;
      pointer-events: none;
      z-index: 2;
      opacity: 0.3;
    }
    .mist-layer {
      position: absolute;
      width: 200%;
      height: 100%;
      background: repeating-linear-gradient(
        90deg,
        transparent 0%,
        rgba(180, 180, 180, 0.1) 10%,
        transparent 20%
      );
      animation: mistMove 20s linear infinite;
    }
    @keyframes mistMove {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    .graveyard {
      position: relative;
      z-index: 3;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-end;
      gap: 20px;
      padding-bottom: 60px;
      min-height: 50vh;
    }
    .grave {
      position: relative;
      text-align: center;
      cursor: pointer;
      transition: transform 0.3s;
      flex: 0 0 140px;
    }
    .grave:hover { transform: translateY(-5px); }
    .grave-stone {
      width: 100px;
      height: 120px;
      margin: 0 auto;
      position: relative;
    }
    .grave-stone.cross {
      width: 80px;
      height: 100px;
    }
    .grave-stone.cross::before {
      content: "";
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 8px; height: 100%;
      background: var(--sepia);
      border: 2px solid #3a2a1a;
    }
    .grave-stone.cross::after {
      content: "";
      position: absolute;
      top: 25%; left: 15%;
      width: 70%; height: 8px;
      background: var(--sepia);
      border: 2px solid #3a2a1a;
    }
    .grave-stone.cross.upsidedown::before {
      transform: translateX(-50%) rotate(180deg);
    }
    .grave-stone.cross.upsidedown::after {
      transform: rotate(180deg);
      top: 65%;
    }
    .grave-stone.cross.broken::before {
      clip-path: polygon(0 0, 60% 0, 40% 100%, 0 100%);
    }
    .grave-stone.cross.broken::after {
      clip-path: polygon(0 0, 100% 0, 80% 100%, 20% 100%);
    }
    .grave-stone.slant {
      width: 100px; height: 60px;
      background: var(--sepia);
      border: 2px solid #3a2a1a;
      transform: rotate(-5deg);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .grave-stone.slant.bloody {
      background: #5c3a3a;
    }
    .grave-name {
      font-family: "Caveat", cursive;
      font-size: 1.1rem;
      color: var(--cream);
      margin-top: 8px;
    }
    .grave-date {
      font-family: "Special Elite", monospace;
      font-size: 0.7rem;
      color: #5a4a3a;
    }
    .grave-epitaph {
      font-family: "Crimson Text", serif;
      font-size: 0.75rem;
      color: var(--jaundice);
      margin-top: 4px;
      font-style: italic;
      max-width: 120px;
    }
    .grave-user .grave-stone.cross::before,
    .grave-user .grave-stone.cross::after {
      background: var(--blood);
      border-color: #5a2020;
    }
    .grave-user .grave-name {
      color: var(--blood);
      font-size: 1.3rem;
    }
    .spiderweb {
      position: absolute;
      top: 0; left: 0;
      width: 60px; height: 60px;
      opacity: 0.3;
      pointer-events: none;
    }
    .spiderweb svg { width: 100%; height: 100%; }
    .candle {
      position: absolute;
      bottom: -20px; left: 50%;
      transform: translateX(-50%);
      width: 6px; height: 16px;
      background: var(--jaundice);
      border-radius: 2px;
      opacity: 0.6;
    }
    .candle::after {
      content: "";
      position: absolute;
      top: -6px; left: 50%;
      transform: translateX(-50%);
      width: 4px; height: 6px;
      background: var(--blood);
      border-radius: 50%;
      animation: flicker 0.5s alternate infinite;
    }
    @keyframes flicker {
      0% { opacity: 0.8; transform: translateX(-50%) scale(1); }
      100% { opacity: 0.4; transform: translateX(-50%) scale(1.2); }
    }
    .ghost {
      position: absolute;
      top: -30px; left: 50%;
      transform: translateX(-50%);
      font-size: 1.5rem;
      opacity: 0;
      animation: ghostFloat 3s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes ghostFloat {
      0%, 100% { opacity: 0; transform: translateX(-50%) translateY(0); }
      50% { opacity: 0.6; transform: translateX(-50%) translateY(-10px); }
    }
    .blood-stain {
      position: absolute;
      bottom: -10px; left: 20%;
      width: 40px; height: 15px;
      background: radial-gradient(ellipse, rgba(122,40,40,0.6) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    .moon {
      position: absolute;
      top: 40px; right: 40px;
      width: 60px; height: 60px;
      border-radius: 50%;
      background: var(--jaundice);
      opacity: 0.15;
      box-shadow: 0 0 40px var(--jaundice);
    }
    .stars {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 40%;
      pointer-events: none;
    }
    .star {
      position: absolute;
      width: 2px; height: 2px;
      background: var(--cream);
      border-radius: 50%;
      opacity: 0.3;
      animation: twinkle 2s alternate infinite;
    }
    @keyframes twinkle {
      0% { opacity: 0.2; }
      100% { opacity: 0.6; }
    }
    .stats {
      text-align: center;
      padding: 20px;
      font-family: "Special Elite", monospace;
      color: var(--jaundice);
      font-size: 0.9rem;
      z-index: 4;
      position: relative;
    }
    .stats .count { color: var(--blood); font-size: 1.2rem; }
    @media (max-width: 700px) {
      .grave { flex: 0 0 100px; }
      .grave-stone { width: 70px; height: 90px; }
      .grave-stone.cross { width: 60px; height: 80px; }
      .grave-name { font-size: 0.95rem; }
      .grave-epitaph { font-size: 0.65rem; max-width: 90px; }
    }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="back-btn">← Назад</a>
    <h1 id="cemetery-title">Кладбище</h1>
    <p class="subtitle" id="cemetery-subtitle">Дед хоронит всех. Даже тех, кто ещё дышит.</p>
  </header>

  <div class="stats" id="stats">
    Могил: <span class="count" id="grave-count">0</span> | 
    Уровень страха: <span class="count" id="fear-display">0</span>/5
  </div>

  <div class="cemetery-container" id="cemetery">
    <div class="moon"></div>
    <div class="stars" id="stars"></div>
    <div class="mist" id="mist"><div class="mist-layer"></div></div>
    <div class="ground" id="ground"></div>
    <div class="graveyard" id="graveyard"></div>
  </div>

  <script>
    (function() {
      const STORAGE = {
        name: localStorage.getItem('ded_name'),
        visits: parseInt(localStorage.getItem('ded_visits') || '0'),
        fearLevel: parseInt(localStorage.getItem('ded_fear_level') || '0'),
        firstVisit: localStorage.getItem('ded_first_visit'),
        cemetery: JSON.parse(localStorage.getItem('ded_cemetery') || 'null')
      };

      const NPC_NAMES = ['Василий', 'Пётр', 'Анна', 'Мария', 'Иван', 'Фёдор', 'Екатерина', 'Степан', 'Татьяна', 'Григорий', 'Николай', 'Ольга', 'Дмитрий', 'Елена', 'Сергей', 'Людмила', 'Андрей', 'Наталья', 'Алексей', 'Галина'];

      const EPITAPHS = [
        name => `Здесь лежит ${name}. Пришёл посмотреть — остался навсегда.`,
        name => `${name}. Покойся с миром. Хотя Дед не обещает.`,
        name => `Неизвестный гость. Дед знает имя, но не говорит.`,
        name => `${name}. Умер от любопытства. Или от Деда. В основном от Деда.`,
        name => `Вечный покой ${name}. Дед обеспечит.`,
        name => `${name}. Не вставай. Дед ходит рядом.`,
        name => `Здесь спит ${name}. Пока спит.`,
        name => `${name}. Жил. Увидел. Умер.`,
        name => `Гость ${name}. Дед вспомнил. Навсегда.`,
        name => `${name}. Вернулся домой. В землю.`,
        name => `${name}. Думал, что это просто сайт.`,
        name => `Покойся, ${name}. Дед следит.`
      ];

      function randomItem(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
      }

      function formatDate(iso) {
        if (!iso) return new Date().toLocaleDateString('ru-RU');
        const d = new Date(iso);
        return d.toLocaleDateString('ru-RU');
      }

      function generateGraves() {
        let graves = [];
        const isNight = new Date().getHours() >= 20 || new Date().getHours() < 6;
        const visitCount = Math.max(STORAGE.visits, 1);
        const fear = STORAGE.fearLevel;

        // User's grave (first)
        const userName = STORAGE.name || 'Неизвестный';
        const userDate = STORAGE.firstVisit || new Date().toISOString();
        graves.push({
          name: userName,
          date: formatDate(userDate),
          epitaph: randomItem(EPITAPHS)(userName),
          isUser: true,
          type: fear >= 4 ? (isNight ? 'upsidedown' : 'broken') : 'cross'
        });

        // NPC graves (one per visit after first)
        const usedNames = new Set();
        for (let i = 1; i < visitCount; i++) {
          let name;
          do { name = randomItem(NPC_NAMES); } while (usedNames.has(name) && usedNames.size < NPC_NAMES.length);
          usedNames.add(name);
          const date = new Date();
          date.setDate(date.getDate() - i * 3); // spread out
          const type = fear >= 4 ? 'slant' : (fear >= 2 ? 'cross' : 'cross');
          graves.push({
            name: name,
            date: date.toLocaleDateString('ru-RU'),
            epitaph: randomItem(EPITAPHS)(name),
            isUser: false,
            type: type,
            bloody: fear >= 4 && Math.random() > 0.5
          });
        }

        // Demo graves if no visits
        if (visitCount <= 1 && !STORAGE.cemetery) {
          graves.push(
            { name: 'Василий', date: '15.03.2024', epitaph: 'Пришёл посмотреть — остался навсегда.', isUser: false, type: 'cross' },
            { name: 'Мария', date: '02.11.2024', epitaph: 'Дед вспомнил. Навсегда.', isUser: false, type: 'cross' },
            { name: 'Пётр', date: '28.01.2025', epitaph: 'Жил. Увидел. Умер.', isUser: false, type: 'slant' }
          );
        }

        return graves;
      }

      function renderGraves() {
        const container = document.getElementById('graveyard');
        const graves = generateGraves();
        const fear = STORAGE.fearLevel;
        const isNight = new Date().getHours() >= 20 || new Date().getHours() < 6;

        // Update stats
        document.getElementById('grave-count').textContent = graves.length;
        document.getElementById('fear-display').textContent = fear;

        // Update title
        if (STORAGE.name) {
          document.getElementById('cemetery-title').textContent = `Кладбище ${STORAGE.name}`;
        }

        // Ground style
        const ground = document.getElementById('ground');
        if (fear >= 4) ground.classList.add('bloody');

        // Render each grave
        graves.forEach((grave, index) => {
          const div = document.createElement('div');
          div.className = 'grave' + (grave.isUser ? ' grave-user' : '');
          div.style.animationDelay = (index * 0.1) + 's';

          let stoneHTML = '';
          if (grave.type === 'cross') {
            stoneHTML = `<div class="grave-stone cross ${grave.isUser && fear >= 4 ? 'broken' : ''}"></div>`;
          } else if (grave.type === 'upsidedown') {
            stoneHTML = `<div class="grave-stone cross upsidedown"></div>`;
          } else if (grave.type === 'broken') {
            stoneHTML = `<div class="grave-stone cross broken"></div>`;
          } else if (grave.type === 'slant') {
            stoneHTML = `<div class="grave-stone slant ${grave.bloody ? 'bloody' : ''}"><span style="font-family:Special Elite;font-size:0.6rem;color:#3a2a1a;">RIP</span></div>`;
          }

          let extraHTML = '';
          if (fear >= 2) {
            extraHTML += `<div class="candle"></div>`;
          }
          if (fear >= 4 && !grave.isUser) {
            extraHTML += `<div class="ghost">👻</div>`;
            extraHTML += `<div class="blood-stain"></div>`;
          }
          if (fear >= 1 && index % 3 === 0) {
            extraHTML += `<div class="spiderweb"><svg viewBox="0 0 60 60"><path d="M30 0 L30 60 M0 30 L60 30 M8 8 L52 52 M52 8 L8 52" stroke="#5c4a3a" stroke-width="0.5" fill="none"/><circle cx="30" cy="30" r="10" stroke="#5c4a3a" stroke-width="0.5" fill="none"/><circle cx="30" cy="30" r="20" stroke="#5c4a3a" stroke-width="0.5" fill="none"/></svg></div>`;
          }

          div.innerHTML = `
            ${stoneHTML}
            ${extraHTML}
            <div class="grave-name">${grave.name}</div>
            <div class="grave-date">${grave.date}</div>
            <div class="grave-epitaph">${grave.epitaph}</div>
          `;
          container.appendChild(div);
        });

        // Save
        localStorage.setItem('ded_cemetery', JSON.stringify({
          graves: graves.length,
          lastVisit: new Date().toISOString()
        }));
      }

      // Stars
      const starsContainer = document.getElementById('stars');
      for (let i = 0; i < 30; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 2 + 's';
        starsContainer.appendChild(star);
      }

      renderGraves();
    })();
  </script>
</body>
</html>
