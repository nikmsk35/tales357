<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Погреб</title>
    <style>
        :root {
            --blood: #7a2828;
            --graphite: #0a0a0a;
            --cream: #8a7a5a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            height: 100%;
            background: var(--graphite);
            color: var(--cream);
            font-family: "Courier New", Courier, monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.3) 0 1px, transparent 1px 3px);
            pointer-events: none;
            z-index: 1;
        }
        .container {
            position: relative;
            z-index: 2;
            padding: 40px;
        }
        h1 {
            font-size: clamp(4rem, 15vw, 12rem);
            color: var(--blood);
            text-shadow: 0 0 20px rgba(122,40,40,0.5);
            line-height: 1;
            margin-bottom: 20px;
            animation: pulse 3s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        p {
            font-size: clamp(1rem, 3vw, 1.5rem);
            margin-bottom: 12px;
            opacity: 0.8;
        }
        .sub {
            font-size: 0.9rem;
            color: #4a3a2a;
            margin-top: 40px;
            animation: fadeInOut 4s ease-in-out infinite;
        }
        @keyframes fadeInOut {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.9; }
        }
        a {
            color: var(--blood);
            text-decoration: none;
            border-bottom: 1px dashed var(--blood);
        }
        a:hover { color: #fff; }

        .eye {
            position: fixed;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: radial-gradient(circle, #ff0000 20%, #000 60%);
            opacity: 0;
            pointer-events: none;
            animation: blink 5s infinite;
        }
        .eye:nth-child(1) { top: 10%; left: 10%; animation-delay: 0s; }
        .eye:nth-child(2) { top: 80%; right: 15%; animation-delay: 2s; }
        .eye:nth-child(3) { bottom: 20%; left: 30%; animation-delay: 4s; }
        @keyframes blink {
            0%, 90%, 100% { opacity: 0; }
            5% { opacity: 0.8; }
            10% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="eye"></div>
    <div class="eye"></div>
    <div class="eye"></div>

    <div class="container">
        <h1>404</h1>
        <p>Ты не туда попал.</p>
        <p>Дед тебя ждал.</p>
        <p class="sub">Но в погребе места ещё много.</p>
        <p style="margin-top: 40px;"><a href="index.html">← Вернуться на поверхность</a></p>
    </div>
</body>
</html>
